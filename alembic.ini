# Alembic configuration for CogniTeam
# Run from the project root: alembic upgrade head

[alembic]
# Path to the Alembic environment (env.py lives here)
script_location = database/migrations

# Template file used when creating new migration scripts
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

# Timezone for migration timestamp comments
timezone = UTC

# Truncate long revision message slugs to this length
truncate_slug_length = 40

# Leave sqlalchemy.url blank — env.py reads DATABASE_URL at runtime
# to avoid hard-coding credentials in this file.
sqlalchemy.url =

# ---------- logging ---------------------------------------------------------
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
