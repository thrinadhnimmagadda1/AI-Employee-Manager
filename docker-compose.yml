version: "3.9"

services:
  # ── PostgreSQL 15 ─────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: cogniteam_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: cogniteam
      POSTGRES_PASSWORD: cogniteam
      POSTGRES_DB: cogniteam
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cogniteam -d cogniteam"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis 7 ───────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: cogniteam_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ───────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: cogniteam_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://cogniteam:cogniteam@postgres:5432/cogniteam
      REDIS_URL: redis://redis:6379/0
      OLLAMA_BASE_URL: http://host.docker.internal:11434
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Run migrations before starting the API server.
    # `alembic upgrade head` is idempotent — safe to run on every restart.
    command: >
      sh -c "alembic upgrade head &&
             uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --workers 2"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── React Frontend ────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/Dockerfile.frontend
    container_name: cogniteam_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: cogniteam_network
